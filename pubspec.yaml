name: simvault
description: "SimVault - phone number management"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State & routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.1

  # Database (Drift + SQLCipher)
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  sqlcipher_flutter_libs: ^0.6.4
  path_provider: ^2.1.4
  path: ^1.9.0

  # Secure storage & auth
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0

  # Notifications & background
  flutter_local_notifications: ^17.2.3
  workmanager: ^0.5.2
  timezone: ^0.9.4

  # UI
  fl_chart: ^0.69.0
  intl: ^0.20.2

  # Utility
  csv: ^6.0.0
  share_plus: ^10.0.2
  uuid: ^4.5.1
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.20.3

flutter:
  uses-material-design: true
  generate: true
